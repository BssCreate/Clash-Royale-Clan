<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Клан #G89JVCUL</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .clan-header {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .clan-badge {
            width: 100px;
            height: 100px;
            background: #0f3460;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #ffd700;
            border: 3px solid #ffd700;
        }
        .clan-info {
            flex: 1;
        }
        .clan-info p {
            margin: 8px 0;
            font-size: 1.1em;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 5px solid #ffd700;
        }
        .stat-card span {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .member-card {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .member-card:hover {
            transform: translateY(-5px);
            background: #1a1a3a;
        }
        .member-icon {
            width: 50px;
            height: 50px;
            background: #0f3460;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .member-info {
            flex: 1;
        }
        .member-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffd700;
        }
        .member-role {
            font-size: 0.9em;
            color: #aaa;
            text-transform: capitalize;
        }
        .member-trophies {
            font-size: 1.1em;
            margin-top: 5px;
        }
        .trophy-icon {
            color: #ffd700;
            margin-right: 5px;
        }
        .donations {
            font-size: 0.9em;
            color: #7fffd4;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            font-size: 1.5em;
            padding: 40px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Клан Clash Royale #G89JVCUL</h1>
        <div id="clanInfo" class="clan-header">
            <!-- Здесь появится информация о клане -->
        </div>

        <h2>👥 Участники клана</h2>
        <div id="membersList" class="members-grid">
            <!-- Здесь появятся карточки участников -->
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="loading" class="loading">Загрузка данных...</div>
        <footer>Данные предоставлены Clash Royale API</footer>
    </div>

<script>
    const CLAN_TAG = 'G89JVCUL';
    
    // Базовый URL вашего Vercel приложения
    const BASE_URL = 'https://clash-royale-clan.vercel.app/'; // ЗАМЕНИТЕ НА ВАШ URL
    
    // Эндпоинты через прокси
    const CLAN_URL = `${BASE_URL}/api/clans/%23${CLAN_TAG}`;
    const MEMBERS_URL = `${BASE_URL}/api/clans/%23${CLAN_TAG}/members`;

    // Элементы DOM
    const clanInfoDiv = document.getElementById('clanInfo');
    const membersDiv = document.getElementById('membersList');
    const errorDiv = document.getElementById('errorMessage');
    const loadingDiv = document.getElementById('loading');

    // Сначала проверим работу прокси
    async function testProxy() {
        try {
            const testResponse = await fetch(`${BASE_URL}/api/proxy?test=1`);
            const testData = await testResponse.json();
            console.log('Proxy test:', testData);
            return true;
        } catch (error) {
            console.error('Proxy test failed:', error);
            errorDiv.innerHTML = `Прокси не работает: ${error.message}. Проверьте настройки Vercel.`;
            errorDiv.style.display = 'block';
            return false;
        }
    }

    async function fetchData(url) {
        const response = await fetch(url);
        if (!response.ok) {
            if (response.status === 403) {
                throw new Error('403 Forbidden - проверьте API ключ и IP адреса');
            }
            if (response.status === 404) {
                throw new Error('404 Not Found - проверьте URL');
            }
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return await response.json();
    }

    async function loadClanData() {
        try {
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';

            // Сначала тестируем прокси
            const proxyOk = await testProxy();
            if (!proxyOk) {
                loadingDiv.style.display = 'none';
                return;
            }

            // Загружаем данные
            const [clanData, membersData] = await Promise.all([
                fetchData(CLAN_URL),
                fetchData(MEMBERS_URL)
            ]);

            displayClanInfo(clanData);
            displayMembers(membersData.items);
            loadingDiv.style.display = 'none';
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.textContent = `Не удалось загрузить данные: ${error.message}`;
        }
    }

    function displayClanInfo(clan) {
        const warTrophies = clan.clanWarTrophies || 0;
        const clanScore = clan.clanScore || 0;
        const members = clan.members || 0;
        const requiredTrophies = clan.requiredTrophies || 0;
        const type = clan.type ? clan.type.replace('_', ' ') : 'Не указан';
        const location = clan.location ? clan.location.name : 'Не указано';

        let html = `
            <div class="clan-badge">${clan.name ? clan.name.charAt(0) : 'C'}</div>
            <div class="clan-info">
                <h2>${clan.name} (${clan.tag})</h2>
                <p>🏷️ Описание: ${clan.description || 'Нет описания'}</p>
                <div class="stat-grid">
                    <div class="stat-card"><span>🏆 ${clanScore}</span>Трофеи клана</div>
                    <div class="stat-card"><span>⚔️ ${warTrophies}</span>Трофеи войны</div>
                    <div class="stat-card"><span>👥 ${members}/50</span>Участников</div>
                    <div class="stat-card"><span>📊 ${requiredTrophies}</span>Мин. трофеи</div>
                </div>
                <p>🌍 Локация: ${location} | 🔓 Тип: ${type}</p>
            </div>
        `;
        clanInfoDiv.innerHTML = html;
    }

    function displayMembers(members) {
        if (!members || members.length === 0) {
            membersDiv.innerHTML = '<p>Нет данных об участниках</p>';
            return;
        }

        members.sort((a, b) => b.trophies - a.trophies);

        let html = '';
        members.forEach(member => {
            const role = member.role.toLowerCase();
            const roleDisplay = {
                'leader': 'Лидер',
                'coLeader': 'Соруководитель',
                'elder': 'Старейшина',
                'member': 'Участник'
            }[role] || role;

            html += `
                <div class="member-card">
                    <div class="member-icon">${member.name ? member.name.charAt(0) : '?'}</div>
                    <div class="member-info">
                        <div class="member-name">${member.name}</div>
                        <div class="member-role">${roleDisplay}</div>
                        <div class="member-trophies">
                            <span class="trophy-icon">🏆</span> ${member.trophies} 
                            <span style="color: #7fffd4; margin-left: 10px;">📦 ${member.donations || 0}</span>
                        </div>
                        <div class="donations">⭐ Уровень: ${member.expLevel || '?'}</div>
                    </div>
                </div>
            `;
        });

        membersDiv.innerHTML = html;
    }

    // Запуск
    loadClanData();
    setInterval(loadClanData, 300000);
</script>
</body>
</html>
