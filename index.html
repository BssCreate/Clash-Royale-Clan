<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Клан #G89JVCUL</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1, h2 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .clan-header {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .clan-badge {
            width: 100px;
            height: 100px;
            background: #0f3460;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #ffd700;
            border: 3px solid #ffd700;
        }
        .clan-info {
            flex: 1;
        }
        .clan-info p {
            margin: 8px 0;
            font-size: 1.1em;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 5px solid #ffd700;
        }
        .stat-card span {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .member-card {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .member-card:hover {
            transform: translateY(-5px);
            background: #1a1a3a;
        }
        .member-icon {
            width: 50px;
            height: 50px;
            background: #0f3460;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .member-info {
            flex: 1;
        }
        .member-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffd700;
        }
        .member-role {
            font-size: 0.9em;
            color: #aaa;
            text-transform: capitalize;
        }
        .member-trophies {
            font-size: 1.1em;
            margin-top: 5px;
        }
        .trophy-icon {
            color: #ffd700;
            margin-right: 5px;
        }
        .donations {
            font-size: 0.9em;
            color: #7fffd4;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        .loading {
            text-align: center;
            font-size: 1.5em;
            padding: 40px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Клан Clash Royale #G89JVCUL</h1>
        <div id="clanInfo" class="clan-header">
            <!-- Здесь появится информация о клане -->
        </div>

        <h2>👥 Участники клана</h2>
        <div id="membersList" class="members-grid">
            <!-- Здесь появятся карточки участников -->
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="loading" class="loading">Загрузка данных...</div>
        <footer>Данные предоставлены Clash Royale API</footer>
    </div>

        <script>
        // Конфигурация
        const CLAN_TAG = 'G89JVCUL'; // без #
        
        // Используем наш прокси на Vercel
        const BASE_URL = '/api'; // Относительный путь к прокси
        
        // Эндпоинты
        const CLAN_URL = `${BASE_URL}/clans/%23${CLAN_TAG}`;
        const MEMBERS_URL = `${BASE_URL}/clans/%23${CLAN_TAG}/members`;

        // Элементы DOM
        const clanInfoDiv = document.getElementById('clanInfo');
        const membersDiv = document.getElementById('membersList');
        const errorDiv = document.getElementById('errorMessage');
        const loadingDiv = document.getElementById('loading');

        // Функция для загрузки данных
        async function fetchData(url) {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Ошибка HTTP: ${response.status}`);
            }
            return await response.json();
        }

        // Остальные функции (displayClanInfo, displayMembers) остаются без изменений
        // Загрузка информации о клане и участниках
        async function loadClanData() {
            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';

                const [clanData, membersData] = await Promise.all([
                    fetchData(CLAN_URL),
                    fetchData(MEMBERS_URL)
                ]);

                displayClanInfo(clanData);
                displayMembers(membersData.items);
                loadingDiv.style.display = 'none';
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Не удалось загрузить данные: ${error.message}`;
            }
        }

        // Запуск
        loadClanData();
        setInterval(loadClanData, 300000);
    </script>
</body>
</html>
